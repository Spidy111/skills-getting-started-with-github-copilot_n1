<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>Welcome to Mergington High 🎒</h1>
        <p class="tag">Clubs, Activities, and After-School Fun</p>
        <p class="welcome">Find something you love — join friends, learn new skills, and have fun!</p>
      </div>
    </header>

    <main class="container">
      <aside class="left">
        <div class="toolbar">
          <h3>Available Activities</h3>
          <input id="search" type="search" placeholder="Search activities..." aria-label="Search activities" />
        </div>

        <div id="activities-list" class="activities-grid">
          <!-- Activities will be loaded here -->
          <p class="muted">Loading activities...</p>
        </div>
      </aside>

      <aside class="right" id="signup-container">
        <h3>Sign Up</h3>
        <p class="muted">Choose an activity and enter your school email to join.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Activity</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
            </select>
          </div>
          <button type="submit" id="signup-button">Sign Up</button>
        </form>
        <div id="message" class="message hidden" role="status" aria-live="polite"></div>
      </aside>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
